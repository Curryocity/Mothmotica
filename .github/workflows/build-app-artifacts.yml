name: Build App Artifacts

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ "v*" ]

jobs:
  build:
    name: mothmotica-${{ matrix.target.platform }}
    runs-on: ${{ matrix.target.os }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    strategy:
      fail-fast: false
      matrix:
        target:
          - os: ubuntu-latest
            platform: linux-x86_64
            gui: mothmotica-gui
            cli: mothmotica-cli
          - os: windows-latest
            platform: windows-x86_64
            gui: mothmotica-gui.exe
            cli: mothmotica-cli.exe
          - os: macos-15-intel
            platform: macos-x86_64
            gui: mothmotica-gui
            cli: mothmotica-cli
          - os: macos-14
            platform: macos-arm64
            gui: mothmotica-gui
            cli: mothmotica-cli

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must use the form v1.2.3" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "${version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match VERSION (${version})" >&2
            exit 1
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          release: nightly

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang build-essential libc++-dev libc++abi-dev libglfw3-dev libgl1-mesa-dev xorg-dev python3-ply

      - name: Show Odin version
        run: odin report

      - name: Install Python build dependencies
        run: |
          python -c "import sys; print(sys.executable)"
          python -m pip install --upgrade pip
          python -m pip install ply
          python -m pip show ply

      - name: Build odin-imgui native libraries
        working-directory: third_party/odin-imgui
        run: |
          python -c "import sys; print(sys.executable)"
          python -m pip install ply
          python -m pip show ply
          python build.py

      - name: Build CLI
        run: odin build src -o:size -minimum-os-version:14.0 -out:${{ matrix.target.cli }}

      - name: Build Odin STB libraries
        if: runner.os != 'Windows'
        shell: bash
        run: make -C "$(odin root)/vendor/stb/src"

      - name: Build Odin STB libraries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $odinRoot = odin root
          Push-Location (Join-Path $odinRoot "vendor/stb/src")
          .\build.bat
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Build GUI
        run: odin build gui -o:size -minimum-os-version:14.0 -out:${{ matrix.target.gui }}

      - name: Strip release binaries
        if: runner.os != 'Windows'
        shell: bash
        run: strip "${{ matrix.target.gui }}" "${{ matrix.target.cli }}"

      - name: Strip release binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $strip = Get-Command llvm-strip -ErrorAction SilentlyContinue
          if ($strip) {
            & $strip.Source "${{ matrix.target.gui }}" "${{ matrix.target.cli }}"
          } else {
            Write-Host "llvm-strip was not found; leaving Windows binaries unstripped."
          }

      - name: Package artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact="mothmotica-${{ steps.version.outputs.value }}-${{ matrix.target.platform }}"
          app_version="${{ steps.version.outputs.value }}"
          app_version="${app_version#v}"
          mkdir -p "dist/${artifact}"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            app="dist/${artifact}/Mothmotica.app"
            mkdir -p "${app}/Contents/MacOS" "${app}/Contents/Resources"
            cp "${{ matrix.target.gui }}" "${app}/Contents/MacOS/Mothmotica"
            cp "${{ matrix.target.cli }}" "${app}/Contents/MacOS/mothmotica-cli"
            chmod +x "${app}/Contents/MacOS/Mothmotica" "${app}/Contents/MacOS/mothmotica-cli"
            cp -R asset "${app}/Contents/Resources/asset"

            iconset="dist/${artifact}/Mothmotica.iconset"
            mkdir -p "${iconset}"
            sips -z 16 16     asset/image/mothballpfp.png --out "${iconset}/icon_16x16.png" >/dev/null
            sips -z 32 32     asset/image/mothballpfp.png --out "${iconset}/icon_16x16@2x.png" >/dev/null
            sips -z 32 32     asset/image/mothballpfp.png --out "${iconset}/icon_32x32.png" >/dev/null
            sips -z 64 64     asset/image/mothballpfp.png --out "${iconset}/icon_32x32@2x.png" >/dev/null
            sips -z 128 128   asset/image/mothballpfp.png --out "${iconset}/icon_128x128.png" >/dev/null
            sips -z 256 256   asset/image/mothballpfp.png --out "${iconset}/icon_128x128@2x.png" >/dev/null
            sips -z 256 256   asset/image/mothballpfp.png --out "${iconset}/icon_256x256.png" >/dev/null
            sips -z 512 512   asset/image/mothballpfp.png --out "${iconset}/icon_256x256@2x.png" >/dev/null
            sips -z 512 512   asset/image/mothballpfp.png --out "${iconset}/icon_512x512.png" >/dev/null
            sips -z 1024 1024 asset/image/mothballpfp.png --out "${iconset}/icon_512x512@2x.png" >/dev/null
            python - "${iconset}" "${app}/Contents/Resources/Mothmotica.icns" <<'PY'
          from pathlib import Path
          import sys

          iconset = Path(sys.argv[1])
          output = Path(sys.argv[2])
          items = [
              ("icp4", "icon_16x16.png"),
              ("icp5", "icon_32x32.png"),
              ("icp6", "icon_32x32@2x.png"),
              ("ic07", "icon_128x128.png"),
              ("ic08", "icon_256x256.png"),
              ("ic09", "icon_512x512.png"),
              ("ic10", "icon_512x512@2x.png"),
          ]
          chunks = []
          for code, filename in items:
              data = (iconset / filename).read_bytes()
              chunks.append(code.encode("ascii") + (len(data) + 8).to_bytes(4, "big") + data)
          body = b"".join(chunks)
          output.write_bytes(b"icns" + (len(body) + 8).to_bytes(4, "big") + body)
          PY
            rm -rf "${iconset}"

            cat > "${app}/Contents/Info.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>en</string>
            <key>CFBundleDisplayName</key>
            <string>Mothmotica</string>
            <key>CFBundleExecutable</key>
            <string>Mothmotica</string>
            <key>CFBundleIconFile</key>
            <string>Mothmotica</string>
            <key>CFBundleIdentifier</key>
            <string>com.curryocity.mothmotica</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>Mothmotica</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${app_version}</string>
            <key>CFBundleVersion</key>
            <string>${app_version}</string>
            <key>LSMinimumSystemVersion</key>
            <string>14.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
            printf "APPL????" > "${app}/Contents/PkgInfo"
            xattr -cr "${app}"
            codesign --force --deep --sign - "${app}"
            codesign --verify --deep --strict --verbose=2 "${app}"
            cp README.md LICENSE "dist/${artifact}/"
          else
            cp "${{ matrix.target.gui }}" "dist/${artifact}/"
            cp "${{ matrix.target.cli }}" "dist/${artifact}/"
            cp -R asset "dist/${artifact}/asset"
            cp README.md LICENSE "dist/${artifact}/"
          fi
          tar -czf "dist/${artifact}.tar.gz" -C "dist/${artifact}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mothmotica-${{ steps.version.outputs.value }}-${{ matrix.target.platform }}
          path: dist/mothmotica-${{ steps.version.outputs.value }}-${{ matrix.target.platform }}.tar.gz
