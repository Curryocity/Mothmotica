name: Build Linux CLI

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-linux-cli:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must use the form v1.2.3" >&2
            exit 1
          fi
          echo "value=${version}" >> "${GITHUB_OUTPUT}"

      - name: Setup Odin
        uses: laytan/setup-odin@v2
        with:
          release: nightly

      - name: Show Odin version
        run: odin report

      - name: Build CLI
        run: odin build src -out:mothmotica-linux-x86_64

      - name: Quick test
        run: |
          printf ';s sj45(12) zmm\n\n' | ./mothmotica-linux-x86_64

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mothmotica-${{ steps.version.outputs.value }}-linux-x86_64
          path: mothmotica-linux-x86_64
